name: ci
on:
  pull_request:
  push:
jobs:
  rust:
    strategy:
      matrix:
        runner: [ubuntu-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          path: control-plane
          # Pinned: building against default-branch HEAD couples our CI to
          # unreviewed upstream changes (phase-2 plan, risk 2).
          ref: ca9ee9048d7fca8eec5fe512011b011128e2b0c3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: python3 scripts/phase5_readiness_evidence_test.py
        working-directory: repo
        env:
          DD_TRACE_ENABLED: "false"
          DD_CIVISIBILITY_ENABLED: "false"
      - run: python3 scripts/m8_joint_fork_integrity_evidence_test.py
        working-directory: repo
        env:
          DD_TRACE_ENABLED: "false"
          DD_CIVISIBILITY_ENABLED: "false"
      - run: python3 scripts/m8_joint_fork_integrity_fake_harness_test.py
        working-directory: repo
        env:
          DD_TRACE_ENABLED: "false"
          DD_CIVISIBILITY_ENABLED: "false"
      - run: cargo fmt --all -- --check
        working-directory: repo
      - run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: repo
      - run: cargo build --workspace
        working-directory: repo
      - run: cargo test --workspace
        working-directory: repo
      # Failpoints feature must also stay lint-clean and green (M6 harness
      # builds with it; it is never enabled in release builds).
      - run: cargo clippy -p snapstore-crash -p snapstore-store -p snapstore-pagestore -p snapstore-meta --all-targets --features failpoints -- -D warnings
        working-directory: repo
      - run: cargo test -p snapstore-store -p snapstore-crash -p snapstore-meta --features failpoints
        working-directory: repo
      # M7 GC property suite (gate AC 1, 04-property-suite.md).  The
      # gc-test-hooks feature is separate from failpoints, so it needs its
      # own clippy pass; the gc_properties target has required-features and
      # is skipped by the plain --workspace run above.
      - run: cargo clippy -p snapstore-server --tests --features snapstore-server/gc-test-hooks -- -D warnings
        working-directory: repo
      - run: cargo test -p snapstore-server --test gc_properties --features snapstore-server/gc-test-hooks
        working-directory: repo
        env:
          GC_PROP_CASES: "500"

  # M6 PR smoke: randomized kill cycles + one full failpoint-matrix pass
  # (gate S5 PR profile). Required for merge.
  crash-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          path: control-plane
          ref: ca9ee9048d7fca8eec5fe512011b011128e2b0c3
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo run -p snapstore-crash --features failpoints -- run --cycles 25 --seed 42 --matrix-passes 1
        working-directory: repo

  # M8 bounded cross-repo regression. This is the snapshot-store-side
  # required check: the current snapshot-store commit is checked out as the
  # exact sibling path dependency used by determinism-hypervisor, then the M8
  # replay-commit ref-identity gate runs on the KVM runner.
  m8-ref-identity-bounded:
    # Public repo + self-hosted runner: never let fork PRs onto the box.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, kvm-intel]
    timeout-minutes: 90
    env:
      DH_M7_ACCEPT_JOBS: ${{ vars.M8_BOUNDED_JOBS || '100' }}
      DH_M7_ACCEPT_SLOT_CORES: ${{ vars.M8_SLOT_CORES || '2-5' }}
      DH_M7_ACCEPT_ALLOW_SKIP: "0"
      M8_STORE_ROOT: ${{ github.workspace }}/m8-store-${{ github.run_id }}
      M8_EVIDENCE_ROOT: ${{ github.workspace }}/m8-evidence-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: snapshot-store
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/determinism-hypervisor
          path: determinism-hypervisor
          # M8 support is on the hypervisor default branch. Set repository
          # variable M8_HYPERVISOR_REF only for diagnostic alternate-ref runs.
          ref: ${{ vars.M8_HYPERVISOR_REF || 'main' }}
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          path: control-plane
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/guest-sdk
          path: guest-sdk
      - uses: dtolnay/rust-toolchain@stable
      - run: test -c /dev/kvm && test -r /dev/kvm && test -w /dev/kvm || { echo "::error::/dev/kvm not available/rw on runner"; exit 1; }
      - run: which nasm || { echo "::error::nasm missing on kvm-intel runner"; exit 1; }
      - name: bounded M8 replay-commit ref identity against this snapshot-store SHA
        run: |
          set -euo pipefail
          echo "snapshot-store sha=$(git -C ../snapshot-store rev-parse HEAD)"
          echo "determinism-hypervisor sha=$(git rev-parse HEAD)"
          echo "M8 bounded ref-identity: jobs=$DH_M7_ACCEPT_JOBS slot_cores=$DH_M7_ACCEPT_SLOT_CORES"
          taskset -c "$DH_M7_ACCEPT_SLOT_CORES" true
          rm -rf "$M8_STORE_ROOT" "$M8_EVIDENCE_ROOT"
          mkdir -p "$M8_STORE_ROOT" "$M8_EVIDENCE_ROOT"
          taskset -c "$DH_M7_ACCEPT_SLOT_CORES" cargo test -p dh-worker --test m7_fork_verify --release \
            m8_accept_1000_seeded_forks_replay_commit_ref_identity \
            -- --ignored --nocapture --test-threads=1
        working-directory: determinism-hypervisor
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snapshot-store-m8-ref-identity-bounded-${{ github.run_id }}
          path: ${{ env.M8_EVIDENCE_ROOT }}
          if-no-files-found: ignore
